<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebRust 설정</title>
  <style>
    :root { color-scheme: dark; --bg:#0a0b0d; --card:#14161a; --line:#2a2e36; --text:#e8eef6; --muted:#9aa3b2; --blue:#3b82f6; --green:#22c55e; --red:#ef4444; }
    * { box-sizing: border-box; }
    body { margin:0; font:13px/1.45 -apple-system, system-ui, sans-serif; background:var(--bg); color:var(--text); }
    .wrap { padding:18px 18px 28px; max-width:520px; margin:0 auto; }
    h1 { font-size:16px; font-weight:650; margin:0 0 4px; }
    .sub { color:var(--muted); font-size:12px; margin:0 0 16px; }
    section { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px; margin-bottom:12px; }
    .sec-title { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin:0 0 10px; }
    .row { display:flex; align-items:center; gap:10px; margin:8px 0; flex-wrap:wrap; }
    .row label.lbl { min-width:72px; color:var(--muted); }
    input[type=text], input[type=password], input[type=number], textarea {
      flex:1; min-width:120px; background:#0a0b0d; border:1px solid var(--line); color:var(--text);
      border-radius:8px; padding:8px 10px; font:inherit;
    }
    textarea { width:100%; min-height:64px; resize:vertical; font-family:ui-monospace,Menlo,monospace; font-size:12px; }
    .switch { position:relative; width:42px; height:24px; flex:0 0 auto; }
    .switch input { opacity:0; width:0; height:0; }
    .slider { position:absolute; inset:0; background:#3a3f4a; border-radius:999px; cursor:pointer; transition:.15s; }
    .slider:before { content:""; position:absolute; width:18px; height:18px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.15s; }
    .switch input:checked + .slider { background:var(--blue); }
    .switch input:checked + .slider:before { transform:translateX(18px); }
    .status { font-size:12px; color:var(--muted); }
    .status.on { color:var(--green); }
    .status.off { color:var(--muted); }
    .urls { font-family:ui-monospace,Menlo,monospace; font-size:11px; color:#c5d0e0; white-space:pre-wrap; word-break:break-all;
      background:#0a0b0d; border:1px solid var(--line); border-radius:8px; padding:10px; min-height:48px; }
    .btns { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
    button {
      border:0; border-radius:8px; padding:8px 12px; font:inherit; font-weight:600; cursor:pointer;
      background:#2a2f3a; color:var(--text);
    }
    button.primary { background:var(--blue); color:#fff; }
    button.danger { background:#3a1f1f; color:#fecaca; }
    button:hover { filter:brightness(1.08); }
    button:disabled { opacity:.45; cursor:default; }
    .hint { font-size:11px; color:var(--muted); margin-top:6px; }
    .check { display:flex; align-items:center; gap:8px; margin:6px 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>WebRust 설정</h1>
    <p class="sub">원본 WebDock과 같은 역할 · 메뉴바에서도 열 수 있습니다</p>

    <section>
      <div class="sec-title">서버</div>
      <div class="row">
        <span>서버</span>
        <label class="switch"><input type="checkbox" id="serverEnabled" /><span class="slider"></span></label>
        <span class="status" id="runStatus">○ 꺼짐</span>
      </div>
      <div class="row">
        <label class="lbl">포트</label>
        <input type="number" id="port" min="1" max="65535" value="8090" />
      </div>
      <div class="check">
        <input type="checkbox" id="allowLan" />
        <label for="allowLan">외부 접근 허용 (LAN)</label>
      </div>
      <div class="btns">
        <button type="button" class="primary" id="btnApply">저장 / 적용</button>
        <button type="button" id="btnOpen">브라우저에서 원격 열기</button>
      </div>
      <p class="hint" id="hint"></p>
    </section>

    <section>
      <div class="sec-title">접속 URL</div>
      <div class="urls" id="urls">—</div>
    </section>

    <section>
      <div class="sec-title">토큰</div>
      <div class="row">
        <input type="text" id="token" placeholder="비우면 인증 없음" spellcheck="false" />
        <button type="button" id="btnGen">생성</button>
      </div>
      <p class="hint">토큰이 있으면 브라우저·WS에 필요합니다. URL에 ?token= 이 붙습니다.</p>
    </section>

    <section>
      <div class="sec-title">도메인 허용 목록 (한 줄에 하나)</div>
      <textarea id="domains" placeholder="example.com&#10;*.elice.pro"></textarea>
    </section>

    <section>
      <div class="sec-title">IP 허용 목록</div>
      <div class="check">
        <input type="checkbox" id="ipAllowlistEnabled" />
        <label for="ipAllowlistEnabled">IP 허용 목록 사용</label>
      </div>
      <textarea id="ips" placeholder="192.168.0.10"></textarea>
    </section>

    <section>
      <div class="sec-title">시스템</div>
      <p class="hint" id="configPath"></p>
      <div class="btns">
        <button type="button" class="danger" id="btnQuit">WebRust 종료</button>
      </div>
    </section>
  </div>
  <script>
    const $ = (id) => document.getElementById(id);

    function send(cmd, extra = {}) {
      const payload = JSON.stringify({ cmd, ...extra });
      if (window.ipc && window.ipc.postMessage) {
        window.ipc.postMessage(payload);
      } else if (window.__TAURI_INTERNALS__) {
        // noop
      } else {
        console.warn('no ipc', payload);
      }
    }

    function lines(el) {
      return el.value.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
    }

    function applyState(s) {
      if (!s) return;
      $('serverEnabled').checked = !!s.serverEnabled || !!s.running;
      $('port').value = s.port || 8090;
      $('allowLan').checked = !!s.allowLan;
      $('token').value = s.token || '';
      $('domains').value = (s.allowedDomains || []).join('\n');
      $('ipAllowlistEnabled').checked = !!s.ipAllowlistEnabled;
      $('ips').value = (s.allowedIps || []).join('\n');
      const running = !!s.running;
      const st = $('runStatus');
      st.textContent = running ? '● 실행 중' : '○ 꺼짐';
      st.className = 'status ' + (running ? 'on' : 'off');
      const urls = s.urls || [];
      if (urls.length === 0) {
        $('urls').textContent = running ? '—' : '서버를 켜면 URL이 표시됩니다';
      } else {
        $('urls').textContent = urls.map(u => {
          if (s.hasToken && s.token) return u + '/?token=' + s.token;
          return u;
        }).join('\n');
      }
      $('configPath').textContent = '설정 파일: ' + (s.configPath || '');
      $('hint').textContent = s.message || '';
    }

    window.__onHost = applyState;

    $('btnApply').onclick = () => {
      send('set', {
        serverEnabled: $('serverEnabled').checked,
        port: parseInt($('port').value, 10) || 8090,
        allowLan: $('allowLan').checked,
        token: $('token').value.trim(),
        allowedDomains: lines($('domains')),
        ipAllowlistEnabled: $('ipAllowlistEnabled').checked,
        allowedIps: lines($('ips')),
      });
    };
    $('btnGen').onclick = () => send('genToken');
    $('btnOpen').onclick = () => send('openRemote');
    $('btnQuit').onclick = () => send('quit');
    $('serverEnabled').onchange = () => {
      // Quick toggle: apply immediately like original NSSwitch
      send('set', {
        serverEnabled: $('serverEnabled').checked,
        port: parseInt($('port').value, 10) || 8090,
        allowLan: $('allowLan').checked,
        token: $('token').value.trim(),
        allowedDomains: lines($('domains')),
        ipAllowlistEnabled: $('ipAllowlistEnabled').checked,
        allowedIps: lines($('ips')),
      });
    };

    // Initial load
    send('get');
    setInterval(() => send('get'), 3000);
  </script>
</body>
</html>
