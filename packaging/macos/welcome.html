<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    body { font: 13px/1.45 -apple-system, system-ui, sans-serif; color: #1d1d1f; padding: 12px 16px; }
    h1 { font-size: 18px; margin: 0 0 8px; }
    p { margin: 0 0 8px; }
    code { font-family: ui-monospace, Menlo, monospace; font-size: 12px; }
  </style>
</head>
<body>
  <h1>WebRust</h1>
  <p>Installs <strong>WebRust.app</strong> into <code>/Applications</code>.</p>
  <p>After install: System Settings → Privacy &amp; Security → grant
    <strong>Screen Recording</strong> and <strong>Accessibility</strong> to WebRust.</p>
  <p>Remote UI default port: <code>8090</code> (changeable in Settings).</p>
</body>
</html>
