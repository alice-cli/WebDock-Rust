# PR / main: test + release build on macOS, Windows, Linux
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: webrust-ci

      - name: Linux GUI + PipeWire deps (xcap)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            libssl-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev \
            libclang-dev \
            clang

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Test (server crates, no Tauri shell)
        run: >
          cargo test
          -p webdock-protocol
          -p webdock-core
          -p webdock-platform
          -p webdock-encoder
          -p webdock-server

      - name: Clippy
        run: >
          cargo clippy
          -p webdock-protocol
          -p webdock-core
          -p webdock-platform
          -p webdock-encoder
          -p webdock-server
          -- -W clippy::all

      - name: Release build WebRust binary
        run: cargo build -p webdock-server --release

      - name: Smoke binary
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            ./target/release/WebRust.exe --help || ./target/release/WebRust.exe -h || true
          else
            ./target/release/WebRust --help || true
          fi
