# Tag v* or manual → multi-OS binaries + Windows installer + optional macOS notarize
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.1.0) — empty uses tag or date"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - id: ver
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VER="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VER="${{ inputs.version }}"
            VER="${VER#v}"
          else
            VER="0.1.$(date +%Y%m%d%H%M)"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Release version: $VER"

  build-linux:
    needs: version
    # 24.04: system spa headers match libspa 0.9 used by xcap 0.9 / pipewire 0.9
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libssl-dev \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev \
            libpipewire-0.3-dev libspa-0.2-dev \
            libclang-dev clang \
            libxcb1-dev libxrandr-dev libdbus-1-dev libwayland-dev libegl-dev libgbm-dev \
            libgtk-3-dev libxdo-dev libayatana-appindicator3-dev
      - name: Build
        run: cargo build -p webdock-server --release
      - name: Package
        run: |
          VER="${{ needs.version.outputs.version }}"
          mkdir -p dist/webrust
          cp target/release/WebRust dist/webrust/
          cp -R webui dist/webrust/webui
          cp README.md LICENSE dist/webrust/ 2>/dev/null || true
          mkdir -p dist/webrust/share/applications
          cp packaging/linux/webrust.desktop dist/webrust/share/applications/ 2>/dev/null || true
          tar -C dist -czf "dist/WebRust-linux-${VER}.tar.gz" webrust
          ls -lh dist/
      - uses: actions/upload-artifact@v4
        with:
          name: WebRust-linux
          path: dist/WebRust-linux-*.tar.gz

  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build -p webdock-server --release
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
      - name: Package portable + installer
        shell: pwsh
        run: |
          $VER = "${{ needs.version.outputs.version }}"
          .\packaging\windows\build_installer.ps1 -Version $VER
          Get-ChildItem dist | Format-Table Name, Length
      - uses: actions/upload-artifact@v4
        with:
          name: WebRust-windows
          path: |
            dist/WebRust-windows-*.zip
            dist/WebRust-Setup-*.exe

  build-macos:
    needs: version
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Import certs *before* build so signing always has a keychain ready.
      # Matches WebDock release.yml: Application cert required for signed releases.
      - name: Import Developer ID certificates (Application + Installer)
        id: cert
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_INSTALLER_CERTIFICATE_BASE64: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_BASE64 }}
          APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_CERTIFICATE_BASE64:-}" ]]; then
            echo "has_cert=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No APPLE_CERTIFICATE_BASE64 secret — release will be ad-hoc signed only (Gatekeeper will block)"
            exit 0
          fi
          echo "has_cert=true" >> "$GITHUB_OUTPUT"
          KEYCHAIN_PATH="$RUNNER_TEMP/webrust.keychain-db"
          KEYCHAIN_PASS="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          APP_P12="$RUNNER_TEMP/developer_id_app.p12"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$APP_P12"
          security import "$APP_P12" -P "${APPLE_CERTIFICATE_PASSWORD:-}" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          rm -f "$APP_P12"

          if [[ -n "${APPLE_INSTALLER_CERTIFICATE_BASE64:-}" ]]; then
            INST_P12="$RUNNER_TEMP/developer_id_installer.p12"
            echo "$APPLE_INSTALLER_CERTIFICATE_BASE64" | base64 --decode > "$INST_P12"
            security import "$INST_P12" -P "${APPLE_INSTALLER_CERTIFICATE_PASSWORD:-}" \
              -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
            rm -f "$INST_P12"
            echo "Installer certificate imported"
            echo "has_installer=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No APPLE_INSTALLER_CERTIFICATE_BASE64 — .pkg will be skipped"
            echo "has_installer=false" >> "$GITHUB_OUTPUT"
          fi

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed -e 's/"//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
          security find-identity -v "$KEYCHAIN_PATH" || true
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASS=$KEYCHAIN_PASS" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key
        id: apikey
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_API_KEY_P8:-}" || -z "${APPLE_API_KEY_ID:-}" ]]; then
            echo "has_api_key=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No APPLE_API_KEY_P8 / APPLE_API_KEY_ID — notarization skipped"
            exit 0
          fi
          KEY_DIR="$RUNNER_TEMP/private_keys"
          mkdir -p "$KEY_DIR"
          # notarytool expects AuthKey_<KEY_ID>.p8; write raw PEM body
          printf '%s\n' "$APPLE_API_KEY_P8" > "$KEY_DIR/AuthKey_${APPLE_API_KEY_ID}.p8"
          chmod 600 "$KEY_DIR/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "API_KEY_PATH=$KEY_DIR/AuthKey_${APPLE_API_KEY_ID}.p8" >> "$GITHUB_ENV"
          echo "has_api_key=true" >> "$GITHUB_OUTPUT"

      - name: Build app (unsigned intermediate)
        run: |
          set -euo pipefail
          chmod +x build_app.sh setup_dev_cert.sh
          VER="${{ needs.version.outputs.version }}"
          export SKIP_SIGN=1
          ./build_app.sh
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VER" WebRust.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VER" WebRust.app/Contents/Info.plist

      - name: Sign with Developer ID (hardened runtime)
        if: steps.cert.outputs.has_cert == 'true'
        env:
          SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          ID="${SIGN_IDENTITY:-}"
          if [[ -z "$ID" ]]; then
            ID=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
              | awk -F'"' '/Developer ID Application/{print $2; exit}')
          fi
          if [[ -z "$ID" ]]; then
            echo "::error::No Developer ID Application identity found in keychain"
            security find-identity -v "$KEYCHAIN_PATH" || true
            exit 1
          fi
          echo "Signing as: $ID"
          # Nested binary first, then bundle (same order as WebDock)
          codesign --force --options runtime --timestamp \
            --keychain "$KEYCHAIN_PATH" \
            --sign "$ID" \
            --entitlements WebRust.entitlements \
            WebRust.app/Contents/MacOS/WebRust
          codesign --force --options runtime --timestamp \
            --keychain "$KEYCHAIN_PATH" \
            --sign "$ID" \
            --entitlements WebRust.entitlements \
            WebRust.app
          codesign --verify --deep --strict --verbose=2 WebRust.app
          codesign -dv --verbose=2 WebRust.app 2>&1 | grep -E 'Authority|TeamIdentifier|flags|Timestamp|Identifier' || true

      - name: Ad-hoc sign fallback (no Developer ID secret)
        if: steps.cert.outputs.has_cert != 'true'
        run: |
          set -euo pipefail
          codesign --force --sign - --entitlements WebRust.entitlements \
            WebRust.app/Contents/MacOS/WebRust || true
          codesign --force --sign - WebRust.app
          codesign -dv WebRust.app 2>&1 | grep -E 'Authority|Signature|flags|Identifier' || true

      - name: Notarize and staple app
        if: steps.cert.outputs.has_cert == 'true' && steps.apikey.outputs.has_api_key == 'true'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          ZIP="$RUNNER_TEMP/WebRust-notarize.zip"
          rm -f "$ZIP"
          ditto -c -k --keepParent WebRust.app "$ZIP"
          xcrun notarytool submit "$ZIP" \
            --key "$API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait
          xcrun stapler staple WebRust.app
          xcrun stapler validate WebRust.app
          spctl -a -vv WebRust.app 2>&1 || true

      - name: Package release zip
        run: |
          set -euo pipefail
          VER="${{ needs.version.outputs.version }}"
          mkdir -p dist
          ditto -c -k --keepParent WebRust.app "dist/WebRust-macOS-${VER}.zip"
          ls -lh dist/

      - name: Build signed .pkg installer
        if: steps.cert.outputs.has_cert == 'true'
        env:
          APPLE_INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_IDENTITY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          VER="${{ needs.version.outputs.version }}"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          if ! security find-identity -v "$KEYCHAIN_PATH" | grep -q "Developer ID Installer"; then
            echo "::warning::No Developer ID Installer identity in keychain — skipping .pkg"
            exit 0
          fi

          INST_ID="${APPLE_INSTALLER_IDENTITY:-}"
          if [[ -z "$INST_ID" ]]; then
            INST_ID=$(security find-identity -v "$KEYCHAIN_PATH" \
              | awk -F'"' '/Developer ID Installer/{print $2; exit}')
          fi
          if [[ -z "$INST_ID" ]]; then
            echo "::warning::Could not resolve Installer identity — skipping .pkg"
            exit 0
          fi
          echo "Installer identity: $INST_ID"

          PKG_ROOT="$RUNNER_TEMP/pkgroot"
          rm -rf "$PKG_ROOT"
          mkdir -p "$PKG_ROOT/Applications"
          ditto WebRust.app "$PKG_ROOT/Applications/WebRust.app"

          COMPONENT_PKG="$RUNNER_TEMP/WebRust-component.pkg"
          UNSIGNED_PKG="$RUNNER_TEMP/WebRust-unsigned.pkg"
          SIGNED_PKG="dist/WebRust-macOS-${VER}.pkg"

          pkgbuild \
            --root "$PKG_ROOT" \
            --identifier com.poc.webrust \
            --version "$VER" \
            --install-location / \
            "$COMPONENT_PKG"

          productbuild \
            --package "$COMPONENT_PKG" \
            "$UNSIGNED_PKG"

          productsign \
            --sign "$INST_ID" \
            --keychain "$KEYCHAIN_PATH" \
            "$UNSIGNED_PKG" \
            "$SIGNED_PKG"

          if [[ -n "${API_KEY_PATH:-}" && -n "${APPLE_API_KEY_ID:-}" && -n "${APPLE_API_ISSUER_ID:-}" ]]; then
            echo "Notarizing pkg…"
            xcrun notarytool submit "$SIGNED_PKG" \
              --key "$API_KEY_PATH" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER_ID" \
              --wait
            xcrun stapler staple "$SIGNED_PKG"
            xcrun stapler validate "$SIGNED_PKG" || true
          else
            echo "::warning::Skipping pkg notarization (no API key)"
          fi
          pkgutil --check-signature "$SIGNED_PKG" || true
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: WebRust-macOS
          path: |
            dist/WebRust-macOS-*.zip
            dist/WebRust-macOS-*.pkg
          if-no-files-found: error

  publish:
    needs: [version, build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.zip' -o -name '*.tar.gz' -o -name '*.exe' -o -name '*.msi' -o -name '*.pkg' \) -exec cp {} dist/ \;
          ls -lh dist/
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: WebRust v${{ needs.version.outputs.version }}
          draft: false
          generate_release_notes: true
          files: dist/*
          body: |
            ## WebRust v${{ needs.version.outputs.version }}

            Cross-platform remote desktop host (Rust). **GUI tray + settings** on Windows, macOS, and Linux.

            | File | Platform |
            |------|----------|
            | **`WebRust-macOS-*.pkg`** | macOS installer → **Applications** (Developer ID + notarized when secrets set) |
            | `WebRust-macOS-*.zip` | macOS 14+ portable `WebRust.app` |
            | `WebRust-Setup-*.exe` | **Windows installer** (recommended) |
            | `WebRust-windows-*.zip` | Windows x64 portable + webui |
            | `WebRust-linux-*.tar.gz` | Linux x64 + webui |

            **Docs:** [EN](https://github.com/alice-cli/WebDock-Rust/blob/main/README.md) · [KO](https://github.com/alice-cli/WebDock-Rust/blob/main/docs/README.ko.md) · [signing](https://github.com/alice-cli/WebDock-Rust/blob/main/docs/SIGNING.md)

            ### Install
            - **Windows:** run `WebRust-Setup-*.exe` → Start Menu / tray
            - **macOS (pkg):** open **WebRust-macOS-….pkg** → install to Applications
            - **macOS (zip):** unzip → open **WebRust.app** → Screen Recording + Accessibility → port **8090**
            - **Linux:** extract → `./WebRust` (tray) or `./WebRust --cli --port 8090`

            ### Auto-update
            Settings → **Check for updates**, or CLI: `WebRust --check-update`  
            Uses GitHub Releases (`alice-cli/WebDock-Rust`).

            **H.264:** use `http://127.0.0.1` or HTTPS (WebCodecs). Plain LAN HTTP → JPG.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
