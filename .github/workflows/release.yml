# Tag v* or manual → multi-OS binaries + optional macOS Developer ID notarize
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.1.0) — empty uses tag or date"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - id: ver
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VER="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VER="${{ inputs.version }}"
            VER="${VER#v}"
          else
            VER="0.1.$(date +%Y%m%d%H%M)"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Release version: $VER"

  build-linux:
    needs: version
    # 24.04: system spa headers match libspa 0.9 used by xcap 0.9 / pipewire 0.9
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libssl-dev \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev \
            libpipewire-0.3-dev libspa-0.2-dev \
            libclang-dev clang \
            libxcb1-dev libxrandr-dev libdbus-1-dev libwayland-dev libegl-dev
      - name: Build
        run: cargo build -p webdock-server --release
      - name: Package
        run: |
          VER="${{ needs.version.outputs.version }}"
          mkdir -p dist/webrust
          cp target/release/WebRust dist/webrust/
          cp -R webui dist/webrust/webui
          cp README.md LICENSE dist/webrust/ 2>/dev/null || true
          tar -C dist -czf "dist/WebRust-linux-${VER}.tar.gz" webrust
          ls -lh dist/
      - uses: actions/upload-artifact@v4
        with:
          name: WebRust-linux
          path: dist/WebRust-linux-*.tar.gz

  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build -p webdock-server --release
      - name: Package
        shell: bash
        run: |
          VER="${{ needs.version.outputs.version }}"
          mkdir -p dist/webrust
          cp target/release/WebRust.exe dist/webrust/
          cp -R webui dist/webrust/webui
          cp README.md LICENSE dist/webrust/ 2>/dev/null || true
          (cd dist && 7z a -tzip "WebRust-windows-${VER}.zip" webrust)
          ls -lh dist/
      - uses: actions/upload-artifact@v4
        with:
          name: WebRust-windows
          path: dist/WebRust-windows-*.zip

  build-macos:
    needs: version
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build app (unsigned intermediate)
        run: |
          chmod +x build_app.sh setup_dev_cert.sh
          export SKIP_SIGN=1
          ./build_app.sh
          VER="${{ needs.version.outputs.version }}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VER" WebRust.app/Contents/Info.plist || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VER" WebRust.app/Contents/Info.plist || true

      - name: Import Developer ID (optional)
        id: cert
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_INSTALLER_CERTIFICATE_BASE64: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_BASE64 }}
          APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_CERTIFICATE_BASE64:-}" ]]; then
            echo "has_cert=false" >> "$GITHUB_OUTPUT"
            echo "No APPLE_CERTIFICATE_BASE64 — shipping ad-hoc signed zip only"
            # Local-style dev cert for a stable-ish identity on the runner
            ./setup_dev_cert.sh || true
            export SKIP_SIGN=0
            ./build_app.sh || codesign --force --sign - WebRust.app
            echo "has_cert=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_cert=true" >> "$GITHUB_OUTPUT"
          KEYCHAIN_PATH="$RUNNER_TEMP/webrust.keychain-db"
          KEYCHAIN_PASS="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          APP_P12="$RUNNER_TEMP/dev_id.p12"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$APP_P12"
          security import "$APP_P12" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          rm -f "$APP_P12"
          if [[ -n "${APPLE_INSTALLER_CERTIFICATE_BASE64:-}" ]]; then
            INST_P12="$RUNNER_TEMP/installer.p12"
            echo "$APPLE_INSTALLER_CERTIFICATE_BASE64" | base64 --decode > "$INST_P12"
            security import "$INST_P12" -P "$APPLE_INSTALLER_CERTIFICATE_PASSWORD" \
              -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
            rm -f "$INST_P12"
          fi
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed -e 's/"//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASS=$KEYCHAIN_PASS" >> "$GITHUB_ENV"

      - name: Sign with Developer ID
        if: env.KEYCHAIN_PATH != ''
        env:
          SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          ID="${SIGN_IDENTITY:-}"
          if [[ -z "$ID" ]]; then
            ID=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F'"' '/Developer ID Application/{print $2; exit}')
          fi
          echo "Signing as: $ID"
          codesign --force --options runtime --timestamp \
            --keychain "$KEYCHAIN_PATH" \
            --sign "$ID" \
            --entitlements WebRust.entitlements \
            WebRust.app/Contents/MacOS/WebRust
          codesign --force --options runtime --timestamp \
            --keychain "$KEYCHAIN_PATH" \
            --sign "$ID" \
            --entitlements WebRust.entitlements \
            WebRust.app
          codesign --verify --deep --strict --verbose=2 WebRust.app

      - name: Notarize (optional)
        if: env.KEYCHAIN_PATH != '' && env.APPLE_API_KEY_ID != ''
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_API_KEY_P8:-}" || -z "${APPLE_API_KEY_ID:-}" ]]; then
            echo "Skipping notarization (no API key secrets)"
            exit 0
          fi
          KEY_DIR="$RUNNER_TEMP/private_keys"
          mkdir -p "$KEY_DIR"
          echo "$APPLE_API_KEY_P8" > "$KEY_DIR/AuthKey_${APPLE_API_KEY_ID}.p8"
          chmod 600 "$KEY_DIR/AuthKey_${APPLE_API_KEY_ID}.p8"
          ZIP="$RUNNER_TEMP/WebRust-notarize.zip"
          ditto -c -k --keepParent WebRust.app "$ZIP"
          xcrun notarytool submit "$ZIP" \
            --key "$KEY_DIR/AuthKey_${APPLE_API_KEY_ID}.p8" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait
          xcrun stapler staple WebRust.app

      - name: Package zip
        run: |
          VER="${{ needs.version.outputs.version }}"
          mkdir -p dist
          ditto -c -k --keepParent WebRust.app "dist/WebRust-macOS-${VER}.zip"
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: WebRust-macOS
          path: dist/WebRust-macOS-*.zip

  publish:
    needs: [version, build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.zip' -o -name '*.tar.gz' -o -name '*.pkg' \) -exec cp {} dist/ \;
          ls -lh dist/
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: WebRust v${{ needs.version.outputs.version }}
          draft: false
          generate_release_notes: true
          files: dist/*
          body: |
            ## WebRust v${{ needs.version.outputs.version }}

            Cross-platform remote desktop host (Rust). Web UI: **EN · KO · JA · ZH · DE · FR**.

            | File | Platform |
            |------|----------|
            | `WebRust-macOS-*.zip` | macOS 14+ (`WebRust.app`) |
            | `WebRust-windows-*.zip` | Windows x64 CLI + webui |
            | `WebRust-linux-*.tar.gz` | Linux x64 CLI + webui |

            **Docs:** [EN](https://github.com/alice-cli/WebDock-Rust/blob/main/README.md) · [KO](https://github.com/alice-cli/WebDock-Rust/blob/main/docs/README.ko.md) · [JA](https://github.com/alice-cli/WebDock-Rust/blob/main/docs/README.ja.md) · [ZH](https://github.com/alice-cli/WebDock-Rust/blob/main/docs/README.zh.md) · [DE](https://github.com/alice-cli/WebDock-Rust/blob/main/docs/README.de.md) · [FR](https://github.com/alice-cli/WebDock-Rust/blob/main/docs/README.fr.md)

            ### Install
            - **macOS:** unzip → open **WebRust.app** → Screen Recording + Accessibility → port **8090**
            - **Windows / Linux:** extract → `WebRust --cli --port 8090 --gen-token`

            **H.264:** use `http://127.0.0.1` or HTTPS (WebCodecs). Plain LAN HTTP → JPG.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
