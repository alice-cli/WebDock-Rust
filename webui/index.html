        <!doctype html>
        <html lang="en">
        <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="theme-color" content="#0a0b0d">
        <title>WebRust</title>
        <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
        <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
        <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
        <link rel="shortcut icon" href="/favicon.png">
        <link rel="stylesheet" href="/styles.css?v=__WEBRUST_VER__">
        </head>
        <body>
          <div id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <div class="modal-card">
              <h3 class="modal-title" id="modalTitle" data-i18n="confirm">OK</h3>
              <p class="modal-body" id="modalBody"></p>
              <div class="modal-actions">
                <button type="button" class="btn ghost" id="modalCancel" data-i18n="cancel">Cancel</button>
                <button type="button" class="btn danger" id="modalOk" data-i18n="confirm">OK</button>
              </div>
            </div>
          </div>

          <header id="topbar">
            <button type="button" id="menuBtn" class="textbtn" onclick="toggleSidebar()" data-i18n-title="menuTitle">Menu</button>
            <span id="dot" data-i18n-title="connecting"></span>
            <div id="metrics" class="metrics">
              <span class="metric" id="mCpu" title="CPU">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><rect x="5" y="5" width="14" height="14" rx="1"/><path d="M9 2v3M15 2v3M9 19v3M15 19v3M2 9h3M2 15h3M19 9h3M19 15h3"/></svg>
                <span class="metric-val" id="mCpuVal">–</span>
              </span>
              <span class="metric" id="mRam" title="RAM">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><rect x="3" y="7" width="18" height="10" rx="1"/><path d="M7 7v10M12 7v10M17 7v10"/></svg>
                <span class="metric-val" id="mRamVal">–</span>
              </span>
              <span class="metric" id="mDisk" data-i18n-title="disk">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><ellipse cx="12" cy="6" rx="8" ry="3"/><path d="M4 6v6c0 1.7 3.6 3 8 3s8-1.3 8-3V6M4 12v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6"/></svg>
                <span class="metric-val" id="mDiskVal">–</span>
              </span>
            </div>
            <span id="fps">– fps</span>
            <label class="lang-wrap" data-i18n-title="lang">
              <select id="langSelect" onchange="setLang(this.value)" aria-label="Language">
                <option value="en">English</option>
                <option value="ko">한국어</option>
                <option value="ja">日本語</option>
                <option value="zh">中文</option>
                <option value="de">Deutsch</option>
                <option value="fr">Français</option>
              </select>
            </label>
            <button id="themeBtn" class="iconbtn" onclick="toggleTheme()" data-i18n-title="themeDark" aria-label="Theme">
              <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="4"/>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
              </svg>
              <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 14.5A8.5 8.5 0 1 1 9.5 3a7 7 0 0 0 11.5 11.5z"/>
              </svg>
            </button>
          </header>

          <div id="sideBackdrop" onclick="closeSidebar()" aria-hidden="true"></div>
          <div id="shell">
            <div id="side">
              <div class="side-head">
                <span class="side-title" data-i18n="sideTitle">Windows · Apps</span>
                <button type="button" class="textbtn" onclick="closeSidebar()" data-i18n="close" data-i18n-title="close">Close</button>
              </div>
              <div id="quick">
                <div class="section">
                  <span><span data-i18n="quick">Quick launch</span> <span class="count" id="quickCount">0</span></span>
                  <button type="button" class="section-btn" id="quickEditBtn" onclick="toggleQuickEdit()" data-i18n="edit">Edit</button>
                </div>
                <div id="quickList"></div>
              </div>
              <div id="clients">
                <div class="section"><span data-i18n="clients">Connected</span> <span class="count" id="clientCount">0</span></div>
                <div id="clientList" class="client-list"></div>
              </div>
              <div class="tabs">
                <button class="tab active" id="tabWin" onclick="setMode('windows')" data-i18n-title="tabWin">
                  <span data-i18n="tabWin">Windows</span> <span class="badge" id="winBadge">0</span>
                </button>
                <button class="tab" id="tabApp" onclick="setMode('apps')" data-i18n-title="tabApp">
                  <span data-i18n="tabApp">Apps</span> <span class="badge" id="appBadge">0</span>
                </button>
              </div>
              <div id="list"></div>
            </div>
            <div id="main">
              <div id="stage">
                <div id="empty">
                  <div class="empty-icon">▢</div>
                  <strong data-i18n="emptyTitle">Select a window</strong>
                  <span data-i18n="emptyBody" data-i18n-html="1">Pick a window from <b>Menu</b></span>
                </div>
                <canvas id="cv" tabindex="0" style="display:none"></canvas>
                <div id="grip" title="Resize"></div>
              </div>
              <div id="bar">
                <input id="txt" data-i18n-placeholder="txtPh" placeholder="Type text · Enter to send" autocomplete="off" spellcheck="false" enterkeyhint="send" inputmode="text">
                <div class="bar-actions">
                  <button class="btn" onclick="sendText()" data-i18n="send">Send</button>
                  <button id="imeBtn" class="en" onclick="toggleIME()" data-i18n-title="imeTitle">
                    <span class="ime-side" id="imeKo">한</span>
                    <span class="ime-side" id="imeEn">A</span>
                  </button>
                  <div class="fmt">
                    <button type="button" class="fmt-btn" id="preFast" onclick="setPreset('fast')" data-i18n="preFast">Fast</button>
                    <button type="button" class="fmt-btn on" id="preBal" onclick="setPreset('balanced')" data-i18n="preBal">Balanced</button>
                    <button type="button" class="fmt-btn" id="preLive" onclick="setPreset('broadcast')" data-i18n="preLive">Live</button>
                  </div>
                  <div class="fmt">
                    <button type="button" class="fmt-btn on" id="fmtJpeg" onclick="setFormat('jpeg')">JPG</button>
                    <button type="button" class="fmt-btn" id="fmtPng" onclick="setFormat('png')">PNG</button>
                    <button type="button" class="fmt-btn" id="fmtH264" onclick="setFormat('h264')" title="H.264">H264</button>
                  </div>
                  <label class="q" id="qLabel"><span data-i18n="quality">Quality</span> <input id="q" type="range" min="0.2" max="1" step="0.05" value="0.92" oninput="setQuality(this.value)"><span id="qVal">92%</span></label>
                </div>
              </div>
              <div id="status">
                <button class="mini" onclick="toggleBar()" title="Keyboard bar">⌨︎</button>
                <button class="mini" onclick="refreshList()" data-i18n-title="refresh">↻</button>
                <button class="mini" onclick="resetViewAuto()" data-i18n-title="fit">Fit</button>
                <button class="mini" onclick="zoomInStep()" data-i18n-title="zoomIn">＋</button>
                <button class="mini" onclick="zoomOutStep()" data-i18n-title="zoomOut">－</button>
                <span id="zoomHint" class="zoom-hint">100%</span>
                <button type="button" class="mini clip-auto on" id="clipAutoBtn" onclick="toggleClipAuto()" aria-pressed="true">📋 Auto</button>
                <button type="button" class="mini" id="clipPullBtn" onclick="pullRemoteClipboard()" data-i18n="clipPull">Pull</button>
                <span id="statusText">Connecting…</span>
                <span class="keys"></span>
              </div>
            </div>
          </div>
        <script src="/i18n.js?v=__WEBRUST_VER__"></script>
        <script src="/app.js?v=__WEBRUST_VER__"></script>
        </body>
        </html>
